const canvas=document.getElementById('c');
const gl=canvas.getContext('webgl')||canvas.getContext('experimental-webgl');

const vs=`
attribute vec2 a;
varying vec2 uv;
void main(){uv=a*.5+.5;gl_Position=vec4(a,0.,1.);}`;

const fs=`
precision mediump float;
varying vec2 uv;
uniform sampler2D tex;
uniform float time, cell, neon, reach, strength;
uniform vec2  mouse;
uniform vec2  velocity;

float bayer(vec2 p){
  int x=int(mod(p.x,8.)),y=int(mod(p.y,8.));
  float m[64];
  m[0]=0.;m[1]=32.;m[2]=8.;m[3]=40.;m[4]=2.;m[5]=34.;m[6]=10.;m[7]=42.;
  m[8]=48.;m[9]=16.;m[10]=56.;m[11]=24.;m[12]=50.;m[13]=18.;m[14]=58.;m[15]=26.;
  m[16]=12.;m[17]=44.;m[18]=4.;m[19]=36.;m[20]=14.;m[21]=46.;m[22]=6.;m[23]=38.;
  m[24]=60.;m[25]=28.;m[26]=52.;m[27]=20.;m[28]=62.;m[29]=30.;m[30]=54.;m[31]=22.;
  m[32]=3.;m[33]=35.;m[34]=11.;m[35]=43.;m[36]=1.;m[37]=33.;m[38]=9.;m[39]=41.;
  m[40]=51.;m[41]=19.;m[42]=59.;m[43]=27.;m[44]=49.;m[45]=17.;m[46]=57.;m[47]=25.;
  m[48]=15.;m[49]=47.;m[50]=7.;m[51]=39.;m[52]=13.;m[53]=45.;m[54]=5.;m[55]=37.;
  m[56]=63.;m[57]=31.;m[58]=55.;m[59]=23.;m[60]=61.;m[61]=29.;m[62]=53.;m[63]=21.;
  int idx=y*8+x;float v=0.;
  for(int i=0;i<64;i++){if(i==idx){v=m[i];break;}}
  return v/64.;
}

void main(){
  vec2 res = vec2(700.);

  float spd  = length(velocity);
  vec2  vdir = spd > 0.0005 ? normalize(velocity) : vec2(0.);

  /* single Gaussian bump centred on the cursor,
     pushing pixels in the direction of travel */
  vec2  toM  = uv - mouse;
  float dist = length(toM);
  float sigma = 0.04 + (reach / 10.0) * 0.14;   /* spread controlled by reach */
  float bump  = exp(-(dist * dist) / (2.0 * sigma * sigma));
  float disp  = bump * clamp(spd * 20.0, 0.0, 1.0) * (strength / 5.0) * 0.07;

  vec2 warpedUV = uv + vdir * disp;

  /* subtle ambient wave, always on */
  float ambient = sin(uv.y * 6.28 - time * 1.8) * 0.02
                + sin(uv.x * 5.1  + time * 1.3) * 0.012;

  /* diamond bayer on warped coords */
  vec2  wpx = warpedUV * res;
  float a45 = 0.7854;
  vec2  rpx = vec2(cos(a45)*wpx.x - sin(a45)*wpx.y,
                   sin(a45)*wpx.x + cos(a45)*wpx.y);
  float b   = bayer(floor(rpx / cell));

  /* sample image at warped cell centre */
  vec2 cellUV = (floor(wpx / cell) * cell + cell * 0.5) / res;
  cellUV.y    = 1.0 - cellUV.y;
  vec4 col    = texture2D(tex, clamp(cellUV, 0.001, 0.999));
  float luma  = dot(col.rgb, vec3(.299, .587, .114));

  float lit = step(b + ambient, luma);

  if(neon > 0.5){
    vec3 dark = vec3(.05, .01, .1);
    float h   = mod(uv.x*.7 + uv.y*.3 + time*.06, 1.);
    vec3 c1=vec3(1.,.08,.8), c2=vec3(.05,.9,1.), c3=vec3(.7,.05,1.);
    vec3 nc = h<.33 ? mix(c1,c2,h*3.) : h<.66 ? mix(c2,c3,(h-.33)*3.) : mix(c3,c1,(h-.66)*3.);
    gl_FragColor = vec4(mix(dark, nc, lit), 1.);
  } else {
    gl_FragColor = vec4(vec3(lit), 1.);
  }
}`;

function mkShader(type,src){
  const s=gl.createShader(type);
  gl.shaderSource(s,src);gl.compileShader(s);
  if(!gl.getShaderParameter(s,gl.COMPILE_STATUS))console.error(gl.getShaderInfoLog(s));
  return s;
}
const prog=gl.createProgram();
gl.attachShader(prog,mkShader(gl.VERTEX_SHADER,vs));
gl.attachShader(prog,mkShader(gl.FRAGMENT_SHADER,fs));
gl.linkProgram(prog);gl.useProgram(prog);

const vbuf=gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER,vbuf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
const aloc=gl.getAttribLocation(prog,'a');
gl.enableVertexAttribArray(aloc);
gl.vertexAttribPointer(aloc,2,gl.FLOAT,false,0,0);

const uTime=gl.getUniformLocation(prog,'time');
const uCell=gl.getUniformLocation(prog,'cell');
const uNeon=gl.getUniformLocation(prog,'neon');
const uReach=gl.getUniformLocation(prog,'reach');
const uStrength=gl.getUniformLocation(prog,'strength');
const uMouse=gl.getUniformLocation(prog,'mouse');
const uVelocity=gl.getUniformLocation(prog,'velocity');

const tex=gl.createTexture();
gl.bindTexture(gl.TEXTURE_2D,tex);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.NEAREST);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);

let cellV=5,speedV=4,neonV=true,reachV=5,strengthV=5;
document.getElementById('cellSize').oninput=e=>{cellV=+e.target.value;document.getElementById('co').textContent=cellV;};
document.getElementById('speed').oninput=e=>{speedV=+e.target.value;document.getElementById('so').textContent=speedV;};
document.getElementById('reach').oninput=e=>{reachV=+e.target.value;document.getElementById('ro').textContent=reachV;};
document.getElementById('strength').oninput=e=>{strengthV=+e.target.value;document.getElementById('stro').textContent=strengthV;};
document.getElementById('colorMode').onchange=e=>{neonV=e.target.checked;};

let mx=0.5,my=0.5,vx=0,vy=0;
let rawX=0.5,rawY=0.5,prevRawX=0.5,prevRawY=0.5;
let onCanvas=false;

function getUV(e,rect){return[(e.clientX-rect.left)/rect.width, 1-(e.clientY-rect.top)/rect.height];}
canvas.addEventListener('mousemove',e=>{const r=canvas.getBoundingClientRect();[rawX,rawY]=getUV(e,r);onCanvas=true;});
canvas.addEventListener('mouseleave',()=>{onCanvas=false;});
canvas.addEventListener('touchmove',e=>{e.preventDefault();const r=canvas.getBoundingClientRect();[rawX,rawY]=getUV(e.touches[0],r);onCanvas=true;},{passive:false});
canvas.addEventListener('touchend',()=>{onCanvas=false;});

function resize(){const w=Math.min(canvas.offsetWidth||580,580);canvas.width=w;canvas.height=w;gl.viewport(0,0,w,w);}
window.addEventListener('resize',resize);resize();

const lerp=(a,b,t)=>a+(b-a)*t;
let t0=performance.now();

function frame(now){
  const rawVx=(rawX-prevRawX)*60;
  const rawVy=(rawY-prevRawY)*60;
  prevRawX=rawX; prevRawY=rawY;

  vx=lerp(vx, onCanvas?rawVx:0, 0.2) * (onCanvas?1.0:0.92);
  vy=lerp(vy, onCanvas?rawVy:0, 0.2) * (onCanvas?1.0:0.92);
  mx=lerp(mx,rawX,0.12);
  my=lerp(my,rawY,0.12);

  const t=(now-t0)/1000*speedV*0.25;
  gl.uniform1f(uTime,t);
  gl.uniform1f(uCell,cellV);
  gl.uniform1f(uNeon,neonV?1.:0.);
  gl.uniform1f(uReach,reachV);
  gl.uniform1f(uStrength,strengthV);
  gl.uniform2f(uMouse,mx,my);
  gl.uniform2f(uVelocity,vx,vy);
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
  requestAnimationFrame(frame);
}

const img=new Image();
img.onload=()=>{
  gl.bindTexture(gl.TEXTURE_2D,tex);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,img);
  t0=performance.now();
  requestAnimationFrame(frame);
};
img.src='data:image/jpeg;base64,'+B64;
</script>
